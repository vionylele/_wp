<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人資料填寫表</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Sangat penting agar padding tidak merusak lebar */
            font-size: 16px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>個人資料填寫表</h2>
    <form action="#" method="post">
        
        <div class="form-group">
            <label for="name">姓名 (全名)</label>
            <input type="text" id="name" name="name" placeholder="請輸入您的真實姓名" required>
        </div>

        <div class="form-group">
            <label>性別</label>
            <div class="radio-group">
                <label style="font-weight: normal;"><input type="radio" name="gender" value="male"> 男 (Male)</label>
                <label style="font-weight: normal;"><input type="radio" name="gender" value="female"> 女 (Female)</label>
                <label style="font-weight: normal;"><input type="radio" name="gender" value="other"> 其他</label>
            </div>
        </div>

        <div class="form-group">
            <label for="dob">出生日期</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
            <label for="email">電子郵件</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="phone">聯絡電話</label>
            <input type="tel" id="phone" name="phone" placeholder="例如：0912345678" required>
        </div>

        <div class="form-group">
            <label for="occupation">職業</label>
            <select id="occupation" name="occupation">
                <option value="">請選擇您的職業</option>
                <option value="student">學生 (Student)</option>
                <option value="employee">上班族 (Employee)</option>
                <option value="freelance">自由職業者 (Freelancer)</option>
                <option value="business">企業主 (Business Owner)</option>
                <option value="other">其他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="address">通訊地址</label>
            <textarea id="address" name="address" rows="3" placeholder="請填寫完整的聯絡地址"></textarea>
        </div>

        <button type="submit" class="btn-submit">提交資料</button>

    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog v1 - Basic HTML</title>
</head>
<body>
    <h1>Simple Blog</h1>
    <hr>
    <h2>Create Post</h2>
    <form>
        <p>Title: <input type="text" placeholder="Post title"></p>
        <p>Author: <input type="text" placeholder="Your name"></p>
        <p>Content: <textarea placeholder="Write your content"></textarea></p>
        <button type="submit">Publish</button>
    </form>
    <hr>
    <h2>Recent Posts</h2>
    <p>No posts yet.</p>
</body>
</html>

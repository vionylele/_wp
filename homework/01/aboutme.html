<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人簡介 - 李俽嫺</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background-color: #4A90E2;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 1rem;
        }
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        .info {
            text-align: left;
            margin-top: 1.5rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
        .info p {
            margin: 10px 0;
            color: #666;
        }
        .label {
            font-weight: bold;
            color: #4A90E2;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">李</div>
        <h1>個人簡介</h1>
        
        <div class="info">
            <p><span class="label">姓名：</span>李俽嫺</p>
            <p><span class="label">學號：</span>111410537</p>
            <p><span class="label">學系：</span>資訊工程學系</p>
        </div>
    </div>

</body>
</html>
